services:
    postgres:
        image: postgres:16-alpine
        container_name: clinic-postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: clinic
            POSTGRES_USER: clinic
            POSTGRES_PASSWORD: clinic
        ports:
            - "5432:5432"
        volumes:
            - clinic-postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U clinic -d clinic"]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    clinic-postgres-data: